spring:
  application:
    name: api-gateway

  # Config Server is now REQUIRED - if it's unreachable at startup, this
  # service must fail fast rather than boot on stale/missing config.
  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  cloud:
    config:
      fail-fast: true

    consul:
      discovery:
        enabled: ${CONSUL_DISCOVERY_ENABLED:false}
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false   # set true once Consul discovery is enabled, to auto-route by service id

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200

loki:
  push-url: ${LOKI_PUSH_URL:http://localhost:3100/loki/api/v1/push}

# Routes proxied by GatewayRouteConfig.java - each defaults to the port that
# service listens on when run directly on the host; override with the
# service's container name + port when running through docker-compose.
services:
  auth-service:
    uri: ${AUTH_SERVICE_URL:http://localhost:8082}
  user-service:
    uri: ${USER_SERVICE_URL:http://localhost:8081}
  incident-service:
    uri: ${INCIDENT_SERVICE_URL:http://localhost:8083}
  workflow-service:
    uri: ${WORKFLOW_SERVICE_URL:http://localhost:8086}
  analytics-service:
    uri: ${ANALYTICS_SERVICE_URL:http://localhost:8087}
  audit-service:
    uri: ${AUDIT_SERVICE_URL:http://localhost:8084}
  notification-service:
    uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
