spring:
  application:
    name: workflow-service

  config:
    import: configserver:http://localhost:8888

  cloud:
    config:
      fail-fast: true

logging:
  level:
    root: INFO
    com.sirp.workflow: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

server:
  forward-headers-strategy: framework
