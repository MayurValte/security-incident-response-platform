spring:

  application:
    name: audit-service

  config:
    import: optional:configserver:http://localhost:8888

management:

  endpoints:

    web:

      exposure:

        include: health,info,prometheus

server:

  shutdown: graceful

logging:

  level:

    root: INFO

# PUBLIC key only - this service verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}