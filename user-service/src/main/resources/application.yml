spring:
  application:
    name: user-service

  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  cloud:
    config:
      fail-fast: true

# PUBLIC key only - this service verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}

loki:
  push-url: ${LOKI_PUSH_URL:http://localhost:3100/loki/api/v1/push}
