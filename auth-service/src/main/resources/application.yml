spring:
  application:
    name: auth-service

  # optional: -> boots fine even if Config Server isn't running yet.
  # Remove "optional:" once you actually rely on it in every environment.
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sirp_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      # "update" is fine to get moving; switch to Flyway/Liquibase-managed
      # migrations ("validate" or "none" here) before production.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  cloud:
    consul:
      discovery:
        enabled: ${CONSUL_DISCOVERY_ENABLED:true}
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}

server:
  port: 8082

# RS256 key material - see the top-level README for generation steps.
# private-key is set on the Auth Service ONLY.
jwt:
  public-key: ${JWT_PUBLIC_KEY}
  private-key: ${JWT_PRIVATE_KEY}
  expiration: ${JWT_EXPIRATION:900000}            # 15 min
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

