server:
  port: 8080

spring:

  cloud:

    consul:
      host: localhost
      port: 8500

      discovery:
        service-name: api-gateway
        prefer-ip-address: true

    gateway:

      routes:

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        - id: team-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/teams/**

        - id: incident-service
          uri: lb://incident-service
          predicates:
            - Path=/api/v1/incidents/**

        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/v1/audit/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

# PUBLIC key only - the Gateway verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}