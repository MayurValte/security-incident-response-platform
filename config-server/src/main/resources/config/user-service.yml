spring:

  datasource:

    url: jdbc:postgresql://${DB_HOST:localhost}:5432/sirp_user_db

    username: postgres

    password: postgres

  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      acks: all

      retries: 3

      properties:
        enable.idempotence: true

    template:

      observation-enabled: true

  cloud:

    consul:

      host: ${CONSUL_HOST:localhost}

      port: 8500

      discovery:

        service-name: user-service

        prefer-ip-address: true

server:
  port: 8081

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus