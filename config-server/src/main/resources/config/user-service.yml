spring:

  datasource:

    url: jdbc:postgresql://localhost:5432/sirp_user_db

    username: postgres

    password: root

  jpa:

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        service-name: user-service

        prefer-ip-address: true

server:
  port: 8081