server:
  port: 8085

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/sirp_notification_db
    username: postgres
    password: root

  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:
        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers: localhost:29092

    consumer:

      group-id: notification-service

      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring.json.trusted.packages: "*"

    # notification-service is otherwise a pure Kafka consumer (see the topic
    # catalog in CLAUDE.md) - this producer config exists only so
    # KafkaErrorHandlingConfig's DeadLetterPublishingRecoverer has a
    # working KafkaTemplate to republish exhausted-retry records to a
    # per-service .DLT topic, not for any business-event publishing.
    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    listener:

      observation-enabled: true

    template:

      observation-enabled: true

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        enabled: true

        register: true

        service-name: notification-service

    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000

  mail:

    host: smtp.gmail.com

    port: 587

    username: ${MAIL_USERNAME}

    password: ${MAIL_PASSWORD}

    properties:

      mail:

        smtp:

          auth: true

          starttls:

            enable: true

# How often NotificationRetryScheduler sweeps FAILED notifications for a
# re-send attempt (capped at 3 attempts per notification - see that
# class). 5 minutes is a middle ground: frequent enough that a transient
# SMTP blip gets fixed without operator intervention, not so frequent
# it hammers Gmail on every failure.
notification:

  retry:

    check-interval-ms: 300000

# Circuit breaker around the UserClient Feign call (notification-service ->
# user-service), used when building the recipient list for an incident-lifecycle
# email. The fallback already degrades gracefully (skips the notification and
# logs a warning) rather than throwing, so this mostly protects against wasting
# time/threads on a hung backend rather than needing 4xx business-outcome
# exclusions - still ignoring 4xx to keep the failure-rate signal meaningful.
resilience4j:

  circuitbreaker:

    instances:

      user-service:

        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - feign.FeignException.FeignClientException

# Distributed tracing (see CLAUDE.md's "Distributed tracing" section for
# the full picture, including why Kafka needs separate opt-in config
# from Feign/HTTP). 100% sampling is a dev-scale choice, not a
# production default - see that section for the reasoning.
management:

  metrics:

    tags:

      application: ${spring.application.name}

  tracing:

    sampling:

      probability: 1.0

  zipkin:

    tracing:

      endpoint: http://localhost:9411/api/v2/spans

  endpoint:

    health:

      show-details: always

  endpoints:

    web:

      exposure:

        include: health,info,metrics,circuitbreakers,circuitbreakerevents,prometheus

springdoc:

  swagger-ui:

    path: /swagger-ui.html

  api-docs:

    path: /v3/api-docs
