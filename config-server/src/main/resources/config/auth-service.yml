server:
  port: 8082


spring:

  datasource:

    url: jdbc:postgresql://localhost:5432/sirp_auth_db

    username: postgres

    password: root


  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers: localhost:29092

    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      acks: all

      retries: 3

      properties:
        enable.idempotence: true

    template:

      observation-enabled: true

  data:

    redis:

      host: localhost

      port: 6379

  cloud:

    consul:

      host: localhost

      port: 8500

      discovery:

        service-name: auth-service

        prefer-ip-address: true
    openfeign:
      client:

        config:

          default:

            connectTimeout: 3000

            readTimeout: 5000

            loggerLevel: full


jwt:

  public-key: ${JWT_PUBLIC_KEY}

  private-key: ${JWT_PRIVATE_KEY}

  expiration:

    900000


  refresh-expiration:

    604800000


# Brute-force protection (LoginAttemptService): 5 failed attempts against
# the same email within a 15-minute window locks that account out for 15
# minutes. Counters live in Redis, not the DB - see LoginAttemptServiceImpl
# for why.
auth:

  login-throttle:

    max-attempts: 5

    attempt-window-seconds: 900

    lockout-seconds: 900


# Circuit breaker around the UserClient Feign call (auth-service -> user-service),
# used by AuthServiceImpl (login/refresh) and CustomUserDetailsService (login).
# 4xx responses (e.g. unknown email) are business outcomes, not backend health
# signals, so they're excluded from the failure count - only 5xx/timeouts/
# connection failures count toward tripping the breaker.
resilience4j:

  circuitbreaker:

    instances:

      user-service:

        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - feign.FeignException.FeignClientException


management:

  tracing:

    sampling:

      probability: 1.0

  zipkin:

    tracing:

      endpoint: http://localhost:9411/api/v2/spans

  endpoints:

    web:

      exposure:

        include: health,info,metrics,circuitbreakers,circuitbreakerevents,prometheus


  endpoint:

    health:

      show-details: always



springdoc:

  swagger-ui:

    path:

      /swagger-ui.html

