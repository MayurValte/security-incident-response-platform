server:
  port: 8087

spring:

  datasource:

    url: jdbc:postgresql://${DB_HOST:localhost}:5432/sirp_analytics_db

    username: postgres

    password: postgres

  jpa:

    hibernate:
      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  data:

    redis:

      host: ${REDIS_HOST:localhost}

      port: 6379

  kafka:

    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

    consumer:

      group-id: analytics-service

      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring.json.trusted.packages: "*"

    # analytics-service is otherwise a pure Kafka consumer (see the topic
    # catalog in CLAUDE.md) - this producer config exists only so
    # KafkaErrorHandlingConfig's DeadLetterPublishingRecoverer has a
    # working KafkaTemplate to republish exhausted-retry records to a
    # per-service .DLT topic, not for any business-event publishing.
    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    listener:

      observation-enabled: true

    template:

      observation-enabled: true

  cloud:

    consul:

      host: ${CONSUL_HOST:localhost}

      port: 8500

      discovery:

        enabled: true

        register: true

        service-name: analytics-service

# Distributed tracing (see CLAUDE.md's "Distributed tracing" section for
# the full picture, including why Kafka needs separate opt-in config
# from Feign/HTTP). 100% sampling is a dev-scale choice, not a
# production default - see that section for the reasoning.
management:

  metrics:

    tags:

      application: ${spring.application.name}

  tracing:

    sampling:

      probability: 1.0

  zipkin:

    tracing:

      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

  endpoint:

    health:

      show-details: always

  endpoints:

    web:

      exposure:

        include: health,info,metrics,prometheus

springdoc:

  swagger-ui:

    path: /swagger-ui.html

  api-docs:

    path: /v3/api-docs
