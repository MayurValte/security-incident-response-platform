server:
  port: 8086

spring:

  datasource:

    url: jdbc:postgresql://${DB_HOST:localhost}:5432/workflow_db

    username: postgres

    password: postgres

    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:

      # Flyway now owns the schema - Hibernate only verifies its entity
      # mappings match what Flyway created, it never alters the schema.
      ddl-auto: validate

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  flyway:

    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

    consumer:

      group-id: workflow-service-group

      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring.json.trusted.packages: "*"

    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      acks: all

      retries: 3

      properties:
        enable.idempotence: true

    template:

      observation-enabled: true

  cloud:

    consul:

      host: ${CONSUL_HOST:localhost}

      port: 8500

      discovery:

        register: true

        service-name: workflow-service

    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000

# Circuit breaker around the IncidentServiceClient Feign calls (workflow-service
# -> incident-service), used by AssignmentServiceImpl/ResolutionServiceImpl when
# mirroring a workflow assign/resolve/close onto the underlying incident. 4xx
# responses (e.g. incident already deleted) are business outcomes, not backend
# health signals, so they're excluded from the failure count.
resilience4j:

  circuitbreaker:

    instances:

      incident-service:

        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - feign.FeignException.FeignClientException

# Distributed tracing (see CLAUDE.md's "Distributed tracing" section for
# the full picture, including why Kafka needs separate opt-in config
# from Feign/HTTP). 100% sampling is a dev-scale choice, not a
# production default - see that section for the reasoning.
management:

  metrics:

    tags:

      application: ${spring.application.name}

  tracing:

    sampling:

      probability: 1.0

  zipkin:

    tracing:

      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

  endpoints:

    web:

      exposure:

        include: health,info,metrics,circuitbreakers,circuitbreakerevents,prometheus

  endpoint:

    health:

      show-details: always

# PUBLIC key only - this service verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}