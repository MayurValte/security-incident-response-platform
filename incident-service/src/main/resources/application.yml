logging:
  level:
    root: INFO

server:
  shutdown: graceful

spring:

  application:
    name: incident-service

  config:
    import: configserver:http://localhost:8888

  cloud:

    config:
      fail-fast: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# PUBLIC key only - this service verifies tokens, never issues them.
jwt:
  public-key: ${JWT_PUBLIC_KEY}

incident:
  attachment:
    storage-dir: ${ATTACHMENT_STORAGE_DIR:./attachment-storage}
