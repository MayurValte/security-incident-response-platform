<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="styles">

  <style>

    body{

        margin:0;
        padding:0;
        background:#f4f6f9;
        font-family:Arial,Helvetica,sans-serif;

    }

    .wrapper{

        width:100%;
        padding:40px 0;

    }

    .container{

        width:720px;
        margin:auto;
        background:white;
        border-radius:12px;
        overflow:hidden;
        box-shadow:0 5px 25px rgba(0,0,0,.08);

    }

    .content{

        padding:35px;

    }

    table{

        width:100%;
        border-collapse:collapse;
        margin-top:25px;

    }

    td{

        padding:14px;
        border-bottom:1px solid #ececec;

    }

    .label{

        width:220px;
        background:#f8fafc;
        font-weight:bold;
        color:#334155;

    }

    .value{

        color:#111827;

    }

    .button{

        display:inline-block;
        margin-top:30px;
        background:#2563eb;
        color:white!important;
        text-decoration:none;
        padding:14px 30px;
        border-radius:8px;
        font-weight:bold;

    }

    .info{

        margin-top:25px;
        padding:18px;
        background:#eff6ff;
        border-left:5px solid #2563eb;

    }

  </style>

</th:block>

</html>
